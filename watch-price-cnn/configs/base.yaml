# ── Base Configuration ────────────────────────────────────────
# Override per-experiment with configs/experiment_*.yaml

project:
  name: watch-price-cnn
  seed: 42

data:
  root_dir: data/raw
  metadata_path: data/metadata.csv
  processed_dir: data/processed
  img_size: 224            # up from 192 in V2 for more detail on finishes/logos
  test_size: 0.15
  val_size: 0.15
  num_workers: 0           # 0 for Windows (spawn); set 4 on Linux/Docker
  pin_memory: true

augmentation:
  horizontal_flip: true
  vertical_flip: false
  rotation_limit: 15
  brightness_limit: 0.15
  contrast_limit: 0.15
  hue_saturation: false     # Disabled: material color (gold/silver) is a price signal
  random_resized_crop: true # Zoom-in augmentation to focus on dial/details
  coarse_dropout: true      # Cutout-style regularization
  clahe: true               # CLAHE preprocessing on all splits (added in V4)
  normalize: true           # ImageNet stats

model:
  architecture: WatchPriceCNN
  max_params: 250000       # Hard constraint
  input_channels: 3
  # Architecture search space (tunable)
  base_filters: 32
  num_blocks: 4
  use_depthwise: true      # Depthwise separable convs to save params
  use_se_block: true       # Squeeze-and-excitation for channel attention
  use_dual_conv: true      # Two convs per block for wider receptive field
  dropout: 0.15            # Reduced from 0.3 (was underfitting)
  activation: gelu
  # Added Brand embedding (multi-input) in V3
  num_brands: 70            # Auto-updated at runtime from metadata
  brand_embed_dim: 16       # 70 brands → 16-dim learned embedding

training:
  epochs: 200
  batch_size: 48
  optimizer: adamw
  learning_rate: 0.0005      # reduced from 0.001 for finer convergence in V4
  weight_decay: 0.01
  loss: mse                  # MSE instead of Huber — better high-price gradients (changed in V4)
  scheduler: cosine
  warmup_epochs: 5
  min_lr: 0.000001           # lower floor for longer training changed in V4 (doesn't affect the performance in great measure)
  early_stopping:
    patience: 25             # more patience with lower LR in V4
    min_delta: 0.0005        # finer threshold lowered in V4
    monitor: val_loss
  gradient_clip: 1.0

target:
  column: price
  log_transform: true      # Log1p transform (skewed distribution)

evaluation:
  metrics: [mae, rmse, r2, mape]

explainability:
  method: gradcam
  target_layer: auto       # Last conv layer
  num_samples: 25          # Images to visualize

output:
  checkpoint_dir: outputs/checkpoints
  figures_dir: outputs/figures
  logs_dir: outputs/logs
  results_dir: outputs/results

device: auto               # auto → cuda if available, else cpu
